{% extends "base.html" %}
{% block content %}

<section class="login-section">

  <div class="container">

    <div class="glass-card" style="max-width:420px;margin:auto;text-align:center;">

      <h2 style="margin-bottom:10px;">🔐 Admin Login</h2>

      <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px;">
        Secure admin login
      </p>

      {% if error %}
        <p style="color:#ef4444;font-size:14px;margin-bottom:10px;">
          {{ error }}
        </p>
      {% endif %}

      <form method="POST">

        <!-- USERNAME -->
        <input type="text" name="username"
               placeholder="Username"
               required
               style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;background:#020617;color:white;">

        <!-- PASSWORD -->
        <input type="password" name="password"
               placeholder="Password"
               required
               style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;background:#020617;color:white;">

        <!-- OTP DESTINATION -->
        <input type="text" name="contact"
               placeholder="Phone or Email for OTP"
               required
               style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;background:#020617;color:white;">

        <!-- SUBMIT -->
        <button type="submit"
                style="width:100%;padding:12px;margin-top:10px;background:#2563eb;color:white;border:none;border-radius:8px;font-weight:600;">
          Login
        </button>

      </form>

      <!-- OPTIONAL HELP TEXT -->
      <p style="margin-top:15px;font-size:12px;color:var(--text-muted);">
        OTP will be sent to your phone or email for verification
      </p>

    </div>

  </div>

</section>

{% endblock %}
